<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoSketch Moon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
  />
  <style>
    body { font-family: sans-serif; margin: 0; }
    #map { height: 60vh; }
    textarea { width: 100%; height: 150px; }
    button { margin: 0.5em; }
    
    .leaflet-draw-toolbar a { 
      width: 35px; 
      height: 35px; 
    }
    
    .note-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      z-index: 10000;
      max-width: 300px;
      width: 90%;
    }
    
    .note-modal input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    
    .note-modal button {
      margin: 5px;
      padding: 8px 15px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    
    .note-modal .ok { background: #4CAF50; color: white; }
    .note-modal .cancel { background: #f44336; color: white; }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
  </style>
  
</head>
<body>
  
  <h2>GeoSketch Moon</h2>
  <textarea id="wktinput" placeholder="Paste QGIS WKT with fields..."></textarea><br/>
  
  <div style="margin: 0.5em 0;">
    <strong>Filter:</strong>
    <label><input type="radio" name="geomFilter" value="all" checked onchange="filterGeometry()"> All</label>
    <label><input type="radio" name="geomFilter" value="points" onchange="filterGeometry()"> Points</label>
    <label><input type="radio" name="geomFilter" value="lines" onchange="filterGeometry()"> Lines</label>
    <label><input type="radio" name="geomFilter" value="polygons" onchange="filterGeometry()"> Polygons</label>
  </div>
  
  <button onclick="parseInput()">Render</button>
  <button onclick="copyWKT()">Copy WKT</button>
  <button onclick="exportGeoJSON()">Export GeoJSON</button>
  <button onclick="exportCSV()">Export CSV/WKT</button>
  <button onclick="shareURL()">Copy Shareable URL</button>
  
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="note-modal" id="noteModal">
    <h3>Add Note</h3>
    <input type="text" id="noteInput" placeholder="Enter note...">
    <div>
      <button class="ok" onclick="saveNote()">OK</button>
      <button class="cancel" onclick="cancelNote()">Cancel</button>
    </div>
  </div>
  
  <div id="map"></div>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/wellknown@0.5.0/wellknown.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  
  <script>
    let map = L.map('map').setView([0, 0], 2);
    
    // Moon basemap
    L.tileLayer('https://cartocdn-gusc.global.ssl.fastly.net/opmbuilder/api/v1/map/named/opm-moon-basemap-v0-1/all/{z}/{x}/{y}.png', {
      attribution: "NASA/LRO/LOLA/IAU/USGS/OpenPlanetary",
      tms: false
    }).addTo(map);
    
    let layerGroup = L.featureGroup().addTo(map);
    let features = [];
    let currentDrawnLayer = null;
    
    // Drawing controls
    var drawControl = new L.Control.Draw({
      draw: {
        polyline: true,
        polygon: true,
        marker: true,
        circle: false,
        rectangle: false,
        circlemarker: false
      },
      edit: {
        featureGroup: layerGroup
      }
    });
    map.addControl(drawControl);
    
    // Handle drawing events
    map.on(L.Draw.Event.CREATED, function (e) {
      currentDrawnLayer = e.layer;
      showNoteModal();
    });
    
    function showNoteModal() {
      document.getElementById('modalOverlay').style.display = 'block';
      document.getElementById('noteModal').style.display = 'block';
      document.getElementById('noteInput').focus();
    }
    
    function saveNote() {
      const note = document.getElementById('noteInput').value || 'No note';
      
      if (currentDrawnLayer) {
        layerGroup.addLayer(currentDrawnLayer);
        const geoJsonFeature = currentDrawnLayer.toGeoJSON();
        geoJsonFeature.properties = { note: note };
        currentDrawnLayer.bindPopup(`<b>Note:</b> ${note}`);
        features.push(geoJsonFeature);
        currentDrawnLayer = null;
      }
      
      hideNoteModal();
      document.getElementById('noteInput').value = '';

      updateURL();
    }
    
    function cancelNote() {
      currentDrawnLayer = null;
      hideNoteModal();
      document.getElementById('noteInput').value = '';
    }
    
    function hideNoteModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      document.getElementById('noteModal').style.display = 'none';
    }
    
    map.on(L.Draw.Event.EDITED, function (e) {
      var layers = e.layers;
      layers.eachLayer(function (layer) {
        const geoJson = layer.toGeoJSON();
        const index = features.findIndex(f => 
          JSON.stringify(f.geometry) === JSON.stringify(geoJson.geometry)
        );
        if (index !== -1) {
          features[index].geometry = geoJson.geometry;
        }
      });
      updateURL();
    });
    
    map.on(L.Draw.Event.DELETED, function (e) {
      var layers = e.layers;
      layers.eachLayer(function (layer) {
        const geoJson = layer.toGeoJSON();
        features = features.filter(f => 
          JSON.stringify(f.geometry) !== JSON.stringify(geoJson.geometry)
        );
      });
      updateURL();
    });
    
    function parseInput() {
      const text = document.getElementById('wktinput').value.trim();
      const lines = text.split('\n');
      const headers = lines[0].split('\t');
      const geomCol = headers.findIndex(h => h.toLowerCase().includes("wkt") || h.toLowerCase().includes("geom"));
      if (geomCol === -1) return alert("No geometry column found.");
      
      features = [];
      layerGroup.clearLayers();
      
      for (let i = 1; i < lines.length; i++) {
        const cells = lines[i].split('\t');
        const wkt = cells[geomCol];
        const geom = wellknown.parse(wkt);
        if (!geom) continue;
        
        const props = {};
        headers.forEach((h, j) => { if (j !== geomCol) props[h] = cells[j]; });
        
        const layer = L.geoJSON({ type: "Feature", geometry: geom, properties: props })
          .bindPopup(Object.entries(props).map(([k,v]) => `<b>${k}</b>: ${v}`).join('<br/>'))
          .addTo(layerGroup);
        
        features.push({
          type: "Feature",
          geometry: geom,
          properties: props
        });
      }
      
      if (features.length > 0) {
        map.fitBounds(layerGroup.getBounds(), { padding: [20, 20] });
      }
    }
    
    function filterGeometry() {
      const selectedFilter = document.querySelector('input[name="geomFilter"]:checked').value;
      updateTextareaDisplay(selectedFilter);
    }
    
    function updateTextareaDisplay(filter = 'all') {
      if (features.length === 0) return;
      
      let filteredFeatures = features;
      if (filter !== 'all') {
        const geomMap = {
          'points': 'Point',
          'lines': 'LineString', 
          'polygons': 'Polygon'
        };
        filteredFeatures = features.filter(f => f.geometry.type === geomMap[filter]);
      }
      
      if (filteredFeatures.length === 0) {
        document.getElementById('wktinput').value = `No ${filter} found`;
        return;
      }
      
      const keys = new Set();
      filteredFeatures.forEach(f => Object.keys(f.properties).forEach(k => keys.add(k)));
      const fields = Array.from(keys);
      const lines = [ [...fields, 'wkt_geom'].join('\t') ];
      
      filteredFeatures.forEach(f => {
        const values = fields.map(k => f.properties[k] || "");
        const wkt = toWKT(f.geometry);
        lines.push([...values, wkt].join('\t'));
      });
      
      document.getElementById('wktinput').value = lines.join('\n');
    }
    
    function updateURL() {
      const selectedFilter = document.querySelector('input[name="geomFilter"]:checked').value;
      updateTextareaDisplay(selectedFilter);
    }
    
    function copyWKT() {
      const selectedFilter = document.querySelector('input[name="geomFilter"]:checked').value;
      let exportFeatures = features;
      
      if (selectedFilter !== 'all') {
        const geomMap = {
          'points': 'Point',
          'lines': 'LineString', 
          'polygons': 'Polygon'
        };
        exportFeatures = features.filter(f => f.geometry.type === geomMap[selectedFilter]);
      }
      
      if (!exportFeatures.length) {
        alert(`No ${selectedFilter} to copy`);
        return;
      }
      
      const keys = new Set();
      exportFeatures.forEach(f => Object.keys(f.properties).forEach(k => keys.add(k)));
      const fields = Array.from(keys);
      const lines = [ [...fields, 'wkt_geom'].join('\t') ];
      
      exportFeatures.forEach(f => {
        const values = fields.map(k => f.properties[k] || "");
        const wkt = toWKT(f.geometry);
        lines.push([...values, wkt].join('\t'));
      });
      
      const wktData = lines.join('\n');
      navigator.clipboard.writeText(wktData);
      alert(`${selectedFilter} WKT copied to clipboard!`);
    }
    
    function exportGeoJSON() {
      const selectedFilter = document.querySelector('input[name="geomFilter"]:checked').value;
      let exportFeatures = features;
      
      if (selectedFilter !== 'all') {
        const geomMap = {
          'points': 'Point',
          'lines': 'LineString', 
          'polygons': 'Polygon'
        };
        exportFeatures = features.filter(f => f.geometry.type === geomMap[selectedFilter]);
      }
      
      const data = {
        type: "FeatureCollection",
        features: exportFeatures
      };
      downloadFile(JSON.stringify(data, null, 2), "sketch-moon.geojson", "application/json");
    }
    
    function exportCSV() {
      const selectedFilter = document.querySelector('input[name="geomFilter"]:checked').value;
      let exportFeatures = features;
      
      if (selectedFilter !== 'all') {
        const geomMap = {
          'points': 'Point',
          'lines': 'LineString', 
          'polygons': 'Polygon'
        };
        exportFeatures = features.filter(f => f.geometry.type === geomMap[selectedFilter]);
      }
      
      if (!exportFeatures.length) return alert(`No ${selectedFilter} to export`);
      
      const keys = new Set();
      exportFeatures.forEach(f => Object.keys(f.properties).forEach(k => keys.add(k)));
      const fields = Array.from(keys);
      const lines = [ [...fields, 'WKT'].join('\t') ];
      exportFeatures.forEach(f => {
        const values = fields.map(k => f.properties[k] || "");
        const wkt = toWKT(f.geometry);
        lines.push([...values, wkt].join('\t'));
      });
      downloadFile(lines.join('\n'), "sketch-moon.csv", "text/tab-separated-values");
    }
    
    function toWKT(geom) {
      switch (geom.type) {
        case 'Point': return `POINT(${geom.coordinates.join(' ')})`;
        case 'LineString': return `LINESTRING(${geom.coordinates.map(c => c.join(' ')).join(', ')})`;
        case 'Polygon':
          return `POLYGON((${geom.coordinates[0].map(c => c.join(' ')).join(', ')}))`;
        default: return 'GEOMETRY';
      }
    }
    
    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }
    
    function shareURL() {
      updateURL();
      const input = document.getElementById('wktinput').value;
      const encoded = encodeURIComponent(btoa(input));
      const url = `${location.origin}${location.pathname}#data=${encoded}`;
      navigator.clipboard.writeText(url);
      alert("URL copied to clipboard!");
    }
    
    document.getElementById('noteInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        saveNote();
      }
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        cancelNote();
      }
    });
    
    window.addEventListener("load", () => {
      const hash = location.hash;
      if (hash.startsWith("#data=")) {
        try {
          const decoded = atob(decodeURIComponent(hash.slice(6)));
          document.getElementById('wktinput').value = decoded;
          parseInput();
        } catch (e) {
          console.error("Error decoding shared data:", e);
        }
      }
    });
    
  </script>
</body>
</html>
